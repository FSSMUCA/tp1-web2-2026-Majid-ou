<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TP JavaScript</title>
  </head>
  <body>
    <h1>Exercice 6 - Nommage et débogage</h1>
    <script>

      // Code corrigé — application des conventions camelCase
      
      let premierPrix = 100;        // Correction : 1erPrix interdit (commence par un chiffre)
      let deuxiemePrix = 80;         // Correction : deuxieme prix (espace interdit)
      let prixMinimum = 50;           // Correction : prix-minimum (trait d'union interdit)
      let variableTest = 200;         // Correction : var est un mot réservé
      let prixMaximum = 300;          // Conservation en camelCase (était PrixMaximum)
      
      let prixMoyen = (premierPrix + deuxiemePrix + prixMinimum + variableTest + prixMaximum) / 5;
      
      console.log("Prix moyen : " + prixMoyen);
      console.log("Le prix minimum est : " + prixMinimum);
      console.log("Le prix maximum est : " + prixMaximum);
       
    </script>
  </body>
</html>
