<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TP JavaScript - Exercice 5</title>
  </head>
  <body>
    <h1>Ma fiche de présentation</h1>
    <p id="nomComplet">...</p>
    <p id="age">...</p>
    <p id="ville">...</p>
    <p id="presentation">...</p>

    <script>
      // 1. Déclaration des variables 
      let prenom = "Abdelmajid";
      let nom = "Ouami";
      let age = 20;
      let ville = "Marrakech";

      // 2. Afficher "Prénom NOM"
      document.getElementById("nomComplet").innerHTML = `${prenom} ${nom.toUpperCase()}`;

      // 3. Afficher l'âge et la ville
      document.getElementById("age").innerHTML = `${age} ans`;
      document.getElementById("ville").innerHTML = ville;

      // 4. Afficher la phrase de présentation complète
      document.getElementById("presentation").innerHTML = `Je m'appelle ${prenom} ${nom}, j'ai ${age} ans et j'habite à ${ville}.`;

      // 5. Changer dynamiquement le titre de la page
      document.title = "Fiche de " + prenom;
    </script>
  </body>
</html>
